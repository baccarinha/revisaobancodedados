<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Questionário Completo — Banco de Dados</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0c0e1a;
    --surface: #13162a;
    --surface2: #1a1e35;
    --surface3: #202540;
    --border: rgba(255,255,255,0.07);
    --border-hover: rgba(108,99,255,0.3);
    --accent: #6c63ff;
    --accent2: #a78bfa;
    --correct: #22c55e;
    --correct-bg: rgba(34,197,94,0.1);
    --correct-border: rgba(34,197,94,0.3);
    --wrong: #f43f5e;
    --wrong-bg: rgba(244,63,94,0.1);
    --wrong-border: rgba(244,63,94,0.3);
    --text: #f0f0ff;
    --muted: #7c7fa8;
    --card-radius: 16px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(108,99,255,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(108,99,255,0.04) 1px, transparent 1px);
    background-size: 48px 48px;
    pointer-events: none; z-index: 0;
  }

  .glow1 {
    position: fixed; width: 500px; height: 500px;
    background: radial-gradient(circle, rgba(108,99,255,0.1) 0%, transparent 70%);
    top: -150px; right: -150px; pointer-events: none; z-index: 0;
  }
  .glow2 {
    position: fixed; width: 400px; height: 400px;
    background: radial-gradient(circle, rgba(167,139,250,0.07) 0%, transparent 70%);
    bottom: 100px; left: -100px; pointer-events: none; z-index: 0;
  }

  .container {
    max-width: 820px;
    margin: 0 auto;
    padding: 3rem 1.5rem 6rem;
    position: relative; z-index: 1;
  }

  /* HEADER */
  .header { text-align: center; margin-bottom: 2.5rem; animation: fadeDown 0.6s ease both; }
  .header-badge {
    display: inline-block;
    background: rgba(108,99,255,0.15);
    border: 1px solid rgba(108,99,255,0.3);
    color: var(--accent2);
    font-size: 11px; font-weight: 500;
    letter-spacing: 0.14em; text-transform: uppercase;
    padding: 5px 14px; border-radius: 999px; margin-bottom: 1rem;
  }
  .header h1 {
    font-family: 'Syne', sans-serif;
    font-size: clamp(30px, 5vw, 48px);
    font-weight: 800; line-height: 1.05;
    letter-spacing: -0.025em;
    background: linear-gradient(135deg, #fff 30%, var(--accent2));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .header p { color: var(--muted); font-size: 15px; margin-top: 0.75rem; line-height: 1.5; }

  /* STATS BAR */
  .stats-bar {
    display: grid; grid-template-columns: repeat(4, 1fr);
    gap: 10px; margin-bottom: 2rem;
    animation: fadeDown 0.6s 0.1s ease both;
  }
  .stat-chip {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 12px 10px; text-align: center;
  }
  .stat-chip-val {
    font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 800;
    color: var(--accent2);
  }
  .stat-chip-lbl { font-size: 11px; color: var(--muted); margin-top: 2px; text-transform: uppercase; letter-spacing: 0.06em; }

  /* PROGRESS */
  .progress-wrap { margin-bottom: 2rem; animation: fadeDown 0.6s 0.15s ease both; }
  .progress-info { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .progress-label { font-size: 13px; color: var(--muted); }
  .progress-count { font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 700; color: var(--accent2); }
  .progress-track { height: 5px; background: var(--surface2); border-radius: 3px; overflow: hidden; }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 3px;
    transition: width 0.5s cubic-bezier(0.4,0,0.2,1);
    width: 0%;
  }

  /* CATEGORY LABEL */
  .category-label {
    font-family: 'Syne', sans-serif;
    font-size: 10px; font-weight: 700;
    letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--accent2);
    background: rgba(108,99,255,0.12);
    border: 1px solid rgba(108,99,255,0.2);
    padding: 3px 10px; border-radius: 6px;
    display: inline-block; margin-bottom: 0.5rem;
  }

  /* SECTION TITLE */
  .section-title {
    font-family: 'Syne', sans-serif;
    font-size: 11px; font-weight: 700;
    letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--muted); margin: 2rem 0 1rem; padding-left: 4px;
    display: flex; align-items: center; gap: 10px;
  }
  .section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  /* QUESTION CARD */
  .question-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--card-radius);
    padding: 1.75rem;
    margin-bottom: 1rem;
    transition: border-color 0.2s;
  }
  .question-card:hover { border-color: rgba(108,99,255,0.18); }

  .q-meta { display: flex; align-items: center; gap: 10px; margin-bottom: 1rem; flex-wrap: wrap; }
  .q-num {
    font-family: 'Syne', sans-serif;
    font-size: 11px; font-weight: 700;
    letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--muted); background: var(--surface2);
    padding: 4px 10px; border-radius: 6px;
  }
  .q-status {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--surface2); border: 1.5px solid var(--border);
    transition: all 0.3s; margin-left: auto; flex-shrink: 0;
  }
  .q-status.answered { background: var(--accent); border-color: var(--accent); box-shadow: 0 0 8px rgba(108,99,255,0.5); }

  .q-text { font-size: 16px; font-weight: 400; line-height: 1.65; color: var(--text); margin-bottom: 1.25rem; }

  /* OPTIONS */
  .option {
    display: flex; align-items: flex-start; gap: 12px;
    padding: 12px 14px; border-radius: 10px;
    border: 1px solid var(--border);
    margin-bottom: 8px; cursor: pointer;
    transition: all 0.18s ease; user-select: none;
  }
  .option:hover { background: rgba(108,99,255,0.07); border-color: rgba(108,99,255,0.25); }
  .option.selected { background: rgba(108,99,255,0.12); border-color: rgba(108,99,255,0.5); }
  .option.selected .opt-letter { background: var(--accent); border-color: var(--accent); color: #fff; }

  .opt-letter {
    min-width: 28px; height: 28px; border-radius: 8px;
    border: 1px solid rgba(255,255,255,0.12);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Syne', sans-serif; font-size: 12px; font-weight: 700;
    color: var(--muted); transition: all 0.18s; flex-shrink: 0; margin-top: 1px;
  }
  .opt-text { font-size: 14px; line-height: 1.5; color: var(--text); padding-top: 3px; }

  /* SUBMIT */
  .submit-wrap { margin-top: 2rem; }
  .submit-btn {
    width: 100%; padding: 16px;
    border: none; border-radius: 12px;
    font-family: 'Syne', sans-serif; font-size: 16px; font-weight: 700;
    letter-spacing: 0.03em; cursor: pointer; transition: all 0.2s;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff; position: relative; overflow: hidden;
  }
  .submit-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(108,99,255,0.4); }
  .submit-btn:active { transform: translateY(0); }
  .submit-btn:disabled {
    background: var(--surface2); color: var(--muted);
    cursor: not-allowed; box-shadow: none; transform: none;
  }

  /* RESULT HERO */
  .result-wrap { animation: fadeDown 0.5s ease both; }
  .result-hero {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--card-radius); padding: 2.5rem 2rem;
    text-align: center; margin-bottom: 2rem;
    position: relative; overflow: hidden;
  }
  .result-hero::before {
    content: '';
    position: absolute; width: 350px; height: 350px; border-radius: 50%;
    background: radial-gradient(circle, rgba(108,99,255,0.13), transparent 70%);
    top: -120px; left: 50%; transform: translateX(-50%);
    pointer-events: none;
  }

  .score-ring {
    width: 110px; height: 110px; border-radius: 50%;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    margin: 0 auto 1.5rem; border: 4px solid;
    position: relative; z-index: 1;
  }
  .score-ring.great { border-color: var(--correct); box-shadow: 0 0 40px rgba(34,197,94,0.2); }
  .score-ring.ok    { border-color: #f59e0b;        box-shadow: 0 0 40px rgba(245,158,11,0.2); }
  .score-ring.low   { border-color: var(--wrong);   box-shadow: 0 0 40px rgba(244,63,94,0.2); }
  .score-num {
    font-family: 'Syne', sans-serif; font-size: 32px; font-weight: 800; line-height: 1;
  }
  .score-ring.great .score-num { color: var(--correct); }
  .score-ring.ok    .score-num { color: #f59e0b; }
  .score-ring.low   .score-num { color: var(--wrong); }
  .score-pct { font-size: 13px; color: var(--muted); margin-top: 2px; }

  .result-title {
    font-family: 'Syne', sans-serif; font-size: 26px; font-weight: 800;
    letter-spacing: -0.01em; margin-bottom: 6px;
  }
  .result-sub { font-size: 14px; color: var(--muted); }

  .result-stats {
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 12px; margin-top: 1.75rem;
  }
  .r-stat { background: var(--surface2); border-radius: 10px; padding: 14px 10px; text-align: center; }
  .r-stat-val { font-family: 'Syne', sans-serif; font-size: 28px; font-weight: 800; }
  .r-stat-val.green { color: var(--correct); }
  .r-stat-val.red   { color: var(--wrong); }
  .r-stat-val.blue  { color: var(--accent2); }
  .r-stat-lbl { font-size: 11px; color: var(--muted); margin-top: 2px; text-transform: uppercase; letter-spacing: 0.08em; }

  /* GABARITO CARDS */
  .gabarito-section-title {
    font-family: 'Syne', sans-serif; font-size: 11px; font-weight: 700;
    letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--muted); margin: 2rem 0 1rem; padding-left: 4px;
    display: flex; align-items: center; gap: 10px;
  }
  .gabarito-section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  .result-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--card-radius); padding: 1.5rem;
    margin-bottom: 0.75rem;
  }
  .result-card-header { display: flex; align-items: center; gap: 10px; margin-bottom: 1rem; flex-wrap: wrap; }
  .result-badge {
    font-size: 11px; font-weight: 600; padding: 3px 10px;
    border-radius: 999px; letter-spacing: 0.06em; text-transform: uppercase;
  }
  .result-badge.correct { background: var(--correct-bg); color: var(--correct); border: 1px solid var(--correct-border); }
  .result-badge.wrong   { background: var(--wrong-bg);   color: var(--wrong);   border: 1px solid var(--wrong-border); }
  .result-q-text { font-size: 15px; font-weight: 500; color: var(--text); margin-bottom: 1rem; line-height: 1.55; }

  .opt-result {
    display: flex; align-items: flex-start; gap: 10px;
    padding: 10px 12px; border-radius: 9px; margin-bottom: 6px;
    font-size: 13.5px; border: 1px solid transparent;
  }
  .opt-result.correct { background: var(--correct-bg); border-color: var(--correct-border); color: #4ade80; }
  .opt-result.wrong   { background: var(--wrong-bg);   border-color: var(--wrong-border);   color: #fb7185; }
  .opt-result.neutral { background: var(--surface2); color: var(--muted); }
  .opt-result-icon {
    min-width: 20px; height: 20px;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 700; border-radius: 5px;
    flex-shrink: 0; margin-top: 1px;
  }
  .opt-result.correct .opt-result-icon { background: rgba(34,197,94,0.2); }
  .opt-result.wrong   .opt-result-icon { background: rgba(244,63,94,0.2); }
  .opt-result.neutral .opt-result-icon { background: rgba(255,255,255,0.05); }

  /* RETAKE */
  .retake-btn {
    width: 100%; padding: 14px; background: transparent;
    border: 1px solid rgba(108,99,255,0.4);
    color: var(--accent2); border-radius: 12px;
    font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 700;
    cursor: pointer; margin-top: 1rem; transition: all 0.2s;
  }
  .retake-btn:hover { background: rgba(108,99,255,0.1); border-color: var(--accent); }

  /* CATEGORY FILTER (quiz mode) */
  .filter-wrap {
    display: flex; gap: 8px; flex-wrap: wrap;
    margin-bottom: 1.5rem; animation: fadeDown 0.6s 0.2s ease both;
  }
  .filter-chip {
    padding: 6px 14px; border-radius: 999px;
    border: 1px solid var(--border);
    font-size: 12px; color: var(--muted);
    cursor: default; background: var(--surface);
    font-weight: 500;
  }
  .filter-chip span { color: var(--accent2); font-family: 'Syne', sans-serif; font-weight: 700; margin-left: 4px; }

  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-16px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 520px) {
    .container { padding: 2rem 1rem 4rem; }
    .stats-bar { grid-template-columns: repeat(2, 1fr); }
    .question-card { padding: 1.25rem; }
    .result-hero { padding: 2rem 1.25rem; }
  }
</style>
</head>
<body>
<div class="glow1"></div>
<div class="glow2"></div>

<div class="container">
  <div class="header">
    <div class="header-badge">Material de estudo · Págs. 1–76</div>
    <h1>Questionário Completo<br>Banco de Dados</h1>
    <p>30 questões abrangentes cobrindo todos os tópicos do material</p>
  </div>

  <div class="stats-bar" id="stats-bar">
    <div class="stat-chip"><div class="stat-chip-val">30</div><div class="stat-chip-lbl">Questões</div></div>
    <div class="stat-chip"><div class="stat-chip-val">6</div><div class="stat-chip-lbl">Categorias</div></div>
    <div class="stat-chip"><div class="stat-chip-val" id="answered-count">0</div><div class="stat-chip-lbl">Respondidas</div></div>
    <div class="stat-chip"><div class="stat-chip-val" id="remaining-count">30</div><div class="stat-chip-lbl">Restantes</div></div>
  </div>

  <div class="progress-wrap">
    <div class="progress-info">
      <span class="progress-label">Progresso do questionário</span>
      <span class="progress-count" id="prog-count">0 / 30</span>
    </div>
    <div class="progress-track"><div class="progress-fill" id="prog-fill"></div></div>
  </div>

  <div id="quiz-area"></div>
</div>

<script>
const categories = {
  "Conceitos Fundamentais": [
    {
      q: "O que é um Banco de Dados?",
      opts: [
        "Um programa que executa cálculos matemáticos complexos.",
        "Uma coleção organizada de dados relacionados que interessam a algum usuário ou sistema.",
        "Um sistema operacional voltado para servidores corporativos.",
        "Uma linguagem de programação orientada a objetos."
      ],
      answer: 1
    },
    {
      q: "Qual é a diferença correta entre Dado e Informação?",
      opts: [
        "Dado é informação processada; informação é o dado bruto.",
        "São termos sinônimos usados de forma intercambiável.",
        "Dado é o elemento bruto (ex: '25'); informação é o dado processado e contextualizado (ex: '25 anos de idade').",
        "Dado só existe em formato digital; informação pode ser física ou digital."
      ],
      answer: 2
    },
    {
      q: "Qual das afirmações abaixo é uma característica dos dados ESTRUTURADOS?",
      opts: [
        "Não seguem nenhum modelo pré-definido.",
        "São organizados, rotulados e seguem um modelo estrito definido, como em bancos relacionais.",
        "Combinam características de dados organizados e não organizados.",
        "São armazenados exclusivamente em formato de texto livre."
      ],
      answer: 1
    },
    {
      q: "Arquivos JSON e XML são classificados como qual tipo de dado?",
      opts: [
        "Dados estruturados — possuem tabelas rígidas.",
        "Dados semiestruturados — têm organização por marcadores/tags, mas sem modelo estritamente fixo.",
        "Dados não estruturados — não seguem nenhuma organização.",
        "Dados binários — armazenados em formato de bits."
      ],
      answer: 1
    },
    {
      q: "No contexto de dados semiestruturados, o que torna o XML autodescritivo?",
      opts: [
        "O fato de ser gerado exclusivamente por sistemas automáticos.",
        "A obrigatoriedade de usar tabelas com colunas fixas.",
        "As tags que viajam junto com o dado, identificando seu conteúdo sem precisar de tabela fixa.",
        "A linguagem SQL integrada ao formato XML."
      ],
      answer: 2
    },
    {
      q: "Para dados não estruturados como vídeos, imagens e áudios, qual é o armazenamento mais recomendado?",
      opts: [
        "Banco de dados relacional (SQL).",
        "Arquivos JSON locais.",
        "Object Storage em nuvem (armazenamento em nuvem de objetos).",
        "Planilhas do Excel."
      ],
      answer: 2
    },
    {
      q: "O que são Bancos de Dados de Vetores, como Pinecone e Milvus?",
      opts: [
        "Bancos de dados relacionais com suporte a múltiplos idiomas.",
        "Uma forma de guardar dados não estruturados como coordenadas matemáticas (vetores), permitindo fazer perguntas ao conteúdo por IA.",
        "Sistemas de backup para bancos de dados SQL.",
        "Ferramentas de visualização de dados geográficos."
      ],
      answer: 1
    }
  ],
  "Banco de Dados Relacional (SQL)": [
    {
      q: "O que significa a sigla SQL?",
      opts: [
        "Server Query Language — Linguagem de Consulta de Servidor.",
        "Structured Query Language — Linguagem de Consulta Estruturada.",
        "System Query Logic — Lógica de Consulta do Sistema.",
        "Software Query Line — Linha de Consulta de Software."
      ],
      answer: 1
    },
    {
      q: "Por que o SQL é chamado de linguagem DECLARATIVA?",
      opts: [
        "Porque o programador precisa declarar todas as variáveis antes de usá-las.",
        "Porque é necessário declarar qual SGBD será utilizado no início do código.",
        "Porque você descreve O QUE quer como resultado, e o banco decide automaticamente como buscar.",
        "Porque declara o número de tabelas antes de criar o banco."
      ],
      answer: 2
    },
    {
      q: "O que é um SGBD (Sistema Gerenciador de Banco de Dados)?",
      opts: [
        "Um tipo específico de dado semiestruturado.",
        "O software que gerencia, organiza e manipula os dados — é o intermediário entre o usuário e os dados.",
        "O conjunto de tabelas e registros armazenados.",
        "Um servidor web responsável por hospedar aplicações."
      ],
      answer: 1
    },
    {
      q: "Usando a analogia da biblioteca, o que representa o SGBD?",
      opts: [
        "Os livros nas estantes — a informação bruta guardada.",
        "O prédio da biblioteca — a infraestrutura física.",
        "O bibliotecário e o catálogo — quem sabe onde está tudo, controla o acesso e protege o acervo.",
        "O leitor — o usuário que consome a informação."
      ],
      answer: 2
    },
    {
      q: "Qual é uma vantagem do banco de dados relacional?",
      opts: [
        "Suporte nativo a dados não estruturados como imagens e vídeos.",
        "Facilidade de escalar para bilhões de usuários simultâneos.",
        "Controle de concorrência: organiza a ordem quando vários usuários tentam gravar ao mesmo tempo.",
        "Armazenamento de dados diretamente na memória RAM."
      ],
      answer: 2
    },
    {
      q: "Qual é um ponto NEGATIVO dos bancos de dados relacionais?",
      opts: [
        "Não possuem controle de transações.",
        "Não suportam a linguagem SQL.",
        "Dificuldade de escalabilidade — quando muitos usuários acessam simultaneamente, o sistema pode parar.",
        "Não permitem criar relacionamentos entre tabelas."
      ],
      answer: 2
    },
    {
      q: "O que é o particionamento VERTICAL de dados?",
      opts: [
        "Dividir as linhas da tabela em partes menores por período de tempo.",
        "Dividir as colunas da tabela — colunas frequentes em uma partição e raramente acessadas em outra.",
        "Replicar os dados em múltiplos servidores geograficamente distribuídos.",
        "Separar o banco de dados em arquivos de texto simples."
      ],
      answer: 1
    },
    {
      q: "Qual SGBD é gratuito, popular para web e utilizado por Facebook, Netflix e Uber?",
      opts: ["Oracle Database", "SQL Server", "MySQL", "PostgreSQL"],
      answer: 2
    },
    {
      q: "O PostgreSQL é representado pelo símbolo de um elefante. Qual é o motivo?",
      opts: [
        "Porque foi criado na África.",
        "Porque ocupa muito espaço em memória.",
        "Porque a memória do elefante é muito boa — simbolizando a confiabilidade e robustez do banco.",
        "Porque o projeto foi financiado por zoológicos."
      ],
      answer: 2
    },
    {
      q: "O SQLite é indicado principalmente para qual cenário?",
      opts: [
        "Grandes corporações com milhões de acessos simultâneos.",
        "Guardar dados localmente dentro de um aplicativo, como apps móveis e navegadores.",
        "Bancos financeiros com necessidade de ACID extremo.",
        "Sistemas distribuídos geograficamente."
      ],
      answer: 1
    }
  ],
  "Banco de Dados Não Relacional (NoSQL)": [
    {
      q: "O que diferencia os bancos NoSQL dos bancos relacionais?",
      opts: [

// Flatten all questions
const allQuestions = [];
Object.entries(categories).forEach(([cat, qs]) => {
  qs.forEach(q => allQuestions.push({ ...q, category: cat }));
});

const TOTAL = allQuestions.length;
let selected = new Array(TOTAL).fill(null);
let submitted = false;
const letters = ['A','B','C','D'];

function updateProgress() {
  const n = selected.filter(s => s !== null).length;
  const pct = (n / TOTAL * 100).toFixed(1);
  document.getElementById('prog-fill').style.width = pct + '%';
  document.getElementById('prog-count').textContent = n + ' / ' + TOTAL;
  document.getElementById('answered-count').textContent = n;
  document.getElementById('remaining-count').textContent = TOTAL - n;
}

function render() {
  const area = document.getElementById('quiz-area');
  if (submitted) { renderResult(area); return; }

  let html = '';
  let lastCat = '';
  let globalIdx = 0;

  Object.entries(categories).forEach(([cat, qs]) => {
    html += `<div class="section-title">${cat}</div>`;
    qs.forEach((q, localIdx) => {
      const qi = globalIdx;
      const isAns = selected[qi] !== null;
      html += `<div class="question-card">
        <div class="q-meta">
          <div class="category-label">${cat}</div>
          <span class="q-num">Q${String(qi+1).padStart(2,'0')}</span>
          <span class="q-status${isAns ? ' answered' : ''}"></span>
        </div>
        <div class="q-text">${q.q}</div>`;
      q.opts.forEach((opt, oi) => {
        const sel = selected[qi] === oi;
        html += `<div class="option${sel ? ' selected' : ''}" onclick="pick(${qi},${oi})">
          <div class="opt-letter">${letters[oi]}</div>
          <div class="opt-text">${opt}</div>
        </div>`;
      });
      html += `</div>`;
      globalIdx++;
    });
  });

  const allDone = selected.every(s => s !== null);
  html += `<div class="submit-wrap">
    <button class="submit-btn" ${allDone ? '' : 'disabled'} onclick="doSubmit()">
      ${allDone ? '→ Ver resultado e gabarito completo' : `Responda todas as ${TOTAL} questões para continuar`}
    </button>
  </div>`;

  area.innerHTML = html;
  updateProgress();
}

function pick(qi, oi) {
  if (submitted) return;
  selected[qi] = oi;
  render();
}

function doSubmit() {
  submitted = true;
  window.scrollTo({ top: 0, behavior: 'smooth' });
  render();
}

function renderResult(area) {
  const correct = selected.filter((s,i) => s === allQuestions[i].answer).length;
  const wrong = TOTAL - correct;
  const pct = Math.round(correct / TOTAL * 100);
  const ringCls = pct >= 70 ? 'great' : pct >= 50 ? 'ok' : 'low';
  const msg = pct >= 90 ? 'Excelente! Domínio total!' : pct >= 75 ? 'Muito bom trabalho!' : pct >= 60 ? 'Bom! Continue assim!' : pct >= 40 ? 'Revise o material!' : 'Estude mais o conteúdo!';

  document.getElementById('prog-fill').style.width = '100%';
  document.getElementById('prog-count').textContent = TOTAL + ' / ' + TOTAL;
  document.getElementById('answered-count').textContent = TOTAL;
  document.getElementById('remaining-count').textContent = '0';

  // Per-category score
  let catResults = {};
  Object.keys(categories).forEach(cat => { catResults[cat] = { c: 0, t: 0 }; });
  allQuestions.forEach((q, i) => {
    catResults[q.category].t++;
    if (selected[i] === q.answer) catResults[q.category].c++;
  });

  let catHtml = Object.entries(catResults).map(([cat, r]) => {
    const p = Math.round(r.c / r.t * 100);
    const col = p >= 70 ? '#22c55e' : p >= 50 ? '#f59e0b' : '#f43f5e';
    return `<div class="r-stat" style="text-align:left; padding: 12px 14px;">
      <div style="font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:0.06em; margin-bottom:6px;">${cat}</div>
      <div style="display:flex; align-items:center; gap:10px;">
        <div style="flex:1; height:4px; background:var(--surface3); border-radius:2px; overflow:hidden;">
          <div style="width:${p}%; height:100%; background:${col}; border-radius:2px;"></div>
        </div>
        <span style="font-family:'Syne',sans-serif; font-size:13px; font-weight:700; color:${col};">${r.c}/${r.t}</span>
      </div>
    </div>`;
  }).join('');

  let html = `<div class="result-wrap">
  <div class="result-hero">
    <div class="score-ring ${ringCls}">
      <div class="score-num">${correct}/${TOTAL}</div>
      <div class="score-pct">${pct}%</div>
    </div>
    <div class="result-title">${msg}</div>
    <div class="result-sub">Gabarito completo por categoria abaixo</div>
    <div class="result-stats">
      <div class="r-stat"><div class="r-stat-val green">${correct}</div><div class="r-stat-lbl">Acertos</div></div>
      <div class="r-stat"><div class="r-stat-val red">${wrong}</div><div class="r-stat-lbl">Erros</div></div>
      <div class="r-stat"><div class="r-stat-val blue">${pct}%</div><div class="r-stat-lbl">Aproveitamento</div></div>
    </div>
  </div>

  <div class="gabarito-section-title">Desempenho por categoria</div>
  <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-bottom:2rem;">${catHtml}</div>

  <div class="gabarito-section-title">Gabarito detalhado — todas as questões</div>`;

  let gi = 0;
  Object.entries(categories).forEach(([cat, qs]) => {
    html += `<div style="font-family:'Syne',sans-serif; font-size:10px; font-weight:700; letter-spacing:0.14em; text-transform:uppercase; color:var(--accent2); margin: 1.5rem 0 0.75rem; padding-left:4px;">${cat}</div>`;
    qs.forEach((q) => {
      const qi = gi;
      const userAns = selected[qi];
      const isCorrect = userAns === q.answer;
      const badgeCls = isCorrect ? 'correct' : 'wrong';
      const badgeTxt = isCorrect ? '✓ Acerto' : '✗ Erro';

      html += `<div class="result-card">
        <div class="result-card-header">
          <span class="q-num">Q${String(qi+1).padStart(2,'0')}</span>
          <span class="result-badge ${badgeCls}">${badgeTxt}</span>
        </div>
        <div class="result-q-text">${q.q}</div>`;

      q.opts.forEach((opt, oi) => {
        let cls = 'neutral', icon = letters[oi];
        if (oi === q.answer) { cls = 'correct'; icon = '✓'; }
        else if (oi === userAns && !isCorrect) { cls = 'wrong'; icon = '✗'; }
        html += `<div class="opt-result ${cls}">
          <div class="opt-result-icon">${icon}</div>
          <span>${opt}</span>
        </div>`;
      });
      html += `</div>`;
      gi++;
    });
  });

  html += `<button class="retake-btn" onclick="retake()">↺ Refazer questionário do zero</button></div>`;
  area.innerHTML = html;
}

function retake() {
  selected = new Array(TOTAL).fill(null);
  submitted = false;
  window.scrollTo({ top: 0, behavior: 'smooth' });
  render();
}

render();
</script>
